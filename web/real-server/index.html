<!DOCTYPE html>
<html>
<head>
    <title>Real Production Server</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #2563eb);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            width: 550px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            border-radius: 30px;
            background: #22c55e;
            color: #052e16;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Real Production Server</h1>
        <p>This is the official web server of our lab environment.</p>
        <p>It represents a genuine service that must be protected from attackers.</p>
        <div class="badge">Status: Active & Secure</div>
    </div>
</body>
</html>
